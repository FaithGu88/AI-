name: AI 日报推送

on:
  schedule:
    # 每天北京时间 8:15（UTC 00:15）
    - cron: '15 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 推送 AI 日报到飞书
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: node push-to-feishu.mjs
