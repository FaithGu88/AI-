name: AI 日报推送

on:
  schedule:
    # 多个时间兜底，避免单点被跳过（any single cron may be skipped by GitHub）
    - cron: '23 0 * * *'   # 北京时间 8:23
    - cron: '47 1 * * *'   # 北京时间 9:47 (fallback)
    - cron: '13 3 * * *'   # 北京时间 11:13 (fallback)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 推送日报到飞书并生成备份
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: node push-to-feishu.mjs

      - name: 提交日报备份到仓库
        run: |
          git config user.name "AI日报机器人"
          git config user.email "ai-daily@github.com"
          git add daily/
          if git diff --cached --quiet; then
            echo "没有新的日报备份"
          else
            git commit -m "📰 $(date +%Y-%m-%d) AI日报备份"
            git push
          fi
